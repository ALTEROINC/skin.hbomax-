name: Deploy Kodi Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Bump patch version
        id: version
        run: |
          OLD=$(grep 'id="skin.hbomax.dev"' addon.xml | grep -oP 'version="\K[^"]+')
          MAJOR=$(echo $OLD | cut -d. -f1)
          MINOR=$(echo $OLD | cut -d. -f2)
          PATCH=$(echo $OLD | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/\(id=\"skin.hbomax.dev\"[^>]*version=\"\)${OLD}\"/\1${NEW}\"/" addon.xml
          echo "old=$OLD" >> $GITHUB_OUTPUT
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped $OLD → $NEW"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add addon.xml
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Build Kodi zip
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p staging/skin.hbomax.dev
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='tmp' \
            --exclude='backup' \
            --exclude='.claude' \
            --exclude='.DS_Store' \
            --exclude='.tmp_generalsans' \
            --exclude='.tmp_resvg' \
            --exclude='staging' \
            --exclude='site' \
            . staging/skin.hbomax.dev/
          mkdir -p site
          cd staging
          zip -r ../site/skin.hbomax.dev-${VERSION}.zip skin.hbomax.dev/
          echo "Zip size: $(du -sh ../site/skin.hbomax.dev-${VERSION}.zip)"

      - name: Generate addons.xml, checksum, and index
        run: python3 .github/scripts/generate_repo.py

      - name: Add .nojekyll
        run: touch site/.nojekyll

      - name: Show site contents
        run: find site -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
