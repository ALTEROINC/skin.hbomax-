name: Release Kodi Addon

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Kodi zip
        run: |
          set -euo pipefail
          mkdir -p build/skin.hbomax
          rsync -av ./ build/skin.hbomax/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tools' \
            --exclude='*.md' \
            --exclude='*.py' \
            --exclude='*.txt'
          cd build
          zip -r "../skin.hbomax-${{ github.ref_name }}.zip" skin.hbomax/
          cd ..

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: skin.hbomax-*.zip
