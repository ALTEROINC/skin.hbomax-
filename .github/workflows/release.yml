name: Deploy Kodi Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Get version from addon.xml
        id: version
        run: |
          VERSION=$(grep 'id="skin.hbomax.dev"' addon.xml | grep -oP 'version="\K[^"]+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build Kodi zip
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p staging/skin.hbomax.dev
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='tmp' \
            --exclude='backup' \
            --exclude='.claude' \
            --exclude='.DS_Store' \
            --exclude='.tmp_generalsans' \
            --exclude='.tmp_resvg' \
            --exclude='staging' \
            --exclude='site' \
            . staging/skin.hbomax.dev/
          mkdir -p site
          cd staging
          zip -r ../site/skin.hbomax.dev-${VERSION}.zip skin.hbomax.dev/
          echo "Zip size: $(du -sh ../site/skin.hbomax.dev-${VERSION}.zip)"

      - name: Generate addons.xml, checksum, and index
        run: python3 .github/scripts/generate_repo.py

      - name: Add .nojekyll
        run: touch site/.nojekyll

      - name: Show site contents
        run: find site -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
