name: Deploy Kodi Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from addon.xml
        id: version
        run: |
          VERSION=$(grep -oP 'version="\K[^"]+' addon.xml | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Kodi zip
        run: |
          mkdir -p site/repo/skin.hbomax.dev
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='tmp' \
            --exclude='backup' \
            --exclude='.claude' \
            --exclude='.DS_Store' \
            --exclude='.tmp_generalsans' \
            --exclude='.tmp_resvg' \
            --exclude='site' \
            . site/repo/skin.hbomax.dev/
          cd site/repo
          zip -r skin.hbomax.dev/skin.hbomax.dev-${{ steps.version.outputs.version }}.zip skin.hbomax.dev/ \
            --exclude="skin.hbomax.dev/*.zip"
          cp ../../addon.xml skin.hbomax.dev/addon.xml

      - name: Generate addons.xml and checksum
        run: |
          python3 - <<PYEOF
          import hashlib, re

          with open('addon.xml', 'r') as f:
              addon_content = f.read().strip()

          addons_xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<addons>\n' + addon_content + '\n</addons>\n'

          with open('site/addons.xml', 'w') as f:
              f.write(addons_xml)

          md5 = hashlib.md5(addons_xml.encode('utf-8')).hexdigest()
          with open('site/addons.xml.md5', 'w') as f:
              f.write(md5)
          PYEOF

      - name: Create index and .nojekyll
        run: |
          touch site/.nojekyll
          cat > site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>HBO Max Kodi Skin</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; background: #0d1117; color: #e6edf3; }
              h1 { color: #fff; }
              code { background: #161b22; padding: 12px 16px; display: block; border-radius: 6px; margin: 12px 0; color: #79c0ff; word-break: break-all; }
              p { color: #8b949e; }
            </style>
          </head>
          <body>
            <h1>skin.hbomax.dev</h1>
            <p>Add this URL as a file source in Kodi:</p>
            <code>https://alteroinc.github.io/skin.hbomax-/</code>
            <p>Then: Add-ons → Install from zip file → select the source above → install the zip.</p>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
