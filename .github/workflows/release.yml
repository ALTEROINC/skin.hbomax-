name: Deploy Kodi Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from addon.xml
        id: version
        run: |
          VERSION=$(grep -oP 'version="\K[^"]+' addon.xml | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Kodi zip
        run: |
          mkdir -p dist/skin.hbomax.dev
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='tmp' \
            --exclude='backup' \
            --exclude='.claude' \
            --exclude='.DS_Store' \
            --exclude='.tmp_generalsans' \
            --exclude='.tmp_resvg' \
            --exclude='dist' \
            . dist/skin.hbomax.dev/
          cd dist
          zip -r skin.hbomax.dev-${{ steps.version.outputs.version }}.zip skin.hbomax.dev/

      - name: Build repository structure
        run: |
          mkdir -p repo/skin.hbomax.dev

          # Zip and addon.xml go inside the addon folder
          cp dist/skin.hbomax.dev-${{ steps.version.outputs.version }}.zip repo/skin.hbomax.dev/
          cp addon.xml repo/skin.hbomax.dev/addon.xml

          # Generate addons.xml
          python3 - <<'PYEOF'
          import re

          with open('addon.xml', 'r') as f:
              content = f.read()

          addons_xml = '<?xml version="1.0" encoding="UTF-8"?>\n<addons>\n' + content.strip() + '\n</addons>\n'

          with open('repo/addons.xml', 'w') as f:
              f.write(addons_xml)
          PYEOF

          # Generate addons.xml.md5
          md5sum repo/addons.xml | cut -d' ' -f1 > repo/addons.xml.md5

          # Simple index page
          cat > repo/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>HBO Max Kodi Skin</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; background: #0d1117; color: #e6edf3; }
              h1 { color: #fff; }
              code { background: #161b22; padding: 12px 16px; display: block; border-radius: 6px; margin: 12px 0; color: #79c0ff; }
              p { color: #8b949e; }
            </style>
          </head>
          <body>
            <h1>skin.hbomax.dev</h1>
            <p>Add this URL as a file source in Kodi, then install from the repository:</p>
            <code>https://alteroinc.github.io/skin.hbomax-/</code>
            <p>Kodi → Settings → File Manager → Add Source → paste the URL above → install from zip → install addon from repository.</p>
          </body>
          </html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          force_orphan: true
