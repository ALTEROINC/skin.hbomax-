name: Deploy Kodi Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Get version from addon.xml
        id: version
        run: |
          VERSION=$(grep -oP 'version="\K[^"]+' addon.xml | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build Kodi zip
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p site/repo/skin.hbomax.dev
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='tmp' \
            --exclude='backup' \
            --exclude='.claude' \
            --exclude='.DS_Store' \
            --exclude='.tmp_generalsans' \
            --exclude='.tmp_resvg' \
            --exclude='site' \
            . site/repo/skin.hbomax.dev/
          # Zip to /tmp first to avoid circular reference, then move into place
          cd site/repo
          zip -r /tmp/skin.hbomax.dev-${VERSION}.zip skin.hbomax.dev/
          mv /tmp/skin.hbomax.dev-${VERSION}.zip skin.hbomax.dev/skin.hbomax.dev-${VERSION}.zip
          echo "Zip size: $(du -sh skin.hbomax.dev/skin.hbomax.dev-${VERSION}.zip)"

      - name: Generate addons.xml and checksum
        run: python3 .github/scripts/generate_repo.py

      - name: Assemble site
        run: |
          touch site/.nojekyll
          cp .github/scripts/index.html site/index.html
          echo "--- Site contents ---"
          find site -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
